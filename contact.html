<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background: linear-gradient(120deg,#667db6,#0082c8,#0082c8,#667db6);
min-height:100vh;
}

/* NAVBAR */

nav{
background:rgba(255,255,255,0.9);
padding:18px 0;
display:flex;
justify-content:center; /* CENTER NAVBAR */
align-items:center;
gap:40px;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
backdrop-filter: blur(5px);
}

nav a{
text-decoration:none;
color:#333;
font-size:18px;
font-weight:bold;
position:relative;
padding:5px 10px;
transition:0.3s;
}

/* Hover underline animation */

nav a::after{
content:"";
position:absolute;
left:0;
bottom:-5px;
width:0%;
height:3px;
background:#0072ff;
transition:0.3s;
}

nav a:hover::after{
width:100%;
}

nav a:hover{
color:#0072ff;
}

/* TITLE */

.title{
text-align:center;
margin-top:40px;
color:white;
font-size:42px;
}

/* CONTACT FORM */

.contact-container{
display:flex;
justify-content:center;
align-items:center;
margin-top:40px;
}

.contact-card{
background:white;
padding:35px;
width:400px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.contact-card h2{
text-align:center;
margin-bottom:20px;
color:#0082c8;
}

input, textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

textarea{
resize:none;
height:100px;
}

button{
width:100%;
padding:12px;
border:none;
background:#0082c8;
color:white;
font-size:16px;
border-radius:25px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#005f94;
}

</style>

</head>

<body>

<nav>
<a href="/">Home</a>
<a href="/about">About</a>
<a href="/contact">Contact</a>
<a href="/blog">Blog</a>
</nav>

<h1 class="title">Contact Us</h1>

<div class="contact-container">

<div class="contact-card">

<h2>Send Message</h2>

<form>
<input type="text" placeholder="Your Name" required>
<input type="email" placeholder="Your Email" required>
<textarea placeholder="Your Message"></textarea>
<button type="submit">Send Message</button>
</form>

</div>

</div>

</body>
</html>
