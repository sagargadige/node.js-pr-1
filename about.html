<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
background: linear-gradient(120deg,#ff7e5f,#ff3d00);
height:100vh;
}

/* NAVBAR */

nav{
background:rgba(255,255,255,0.9);
padding:18px 0;
display:flex;
justify-content:center; /* CENTER NAVBAR */
align-items:center;
gap:40px;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
backdrop-filter: blur(5px);
}

nav a{
text-decoration:none;
color:#333;
font-size:18px;
font-weight:bold;
position:relative;
padding:5px 10px;
transition:0.3s;
}

/* Hover underline animation */

nav a::after{
content:"";
position:absolute;
left:0;
bottom:-5px;
width:0%;
height:3px;
background:#0072ff;
transition:0.3s;
}

nav a:hover::after{
width:100%;
}

nav a:hover{
color:#0072ff;
}
/* Hero Title */

.title{
text-align:center;
margin-top:40px;
color:white;
font-size:40px;
letter-spacing:1px;
}

/* About Card */

.about-container{
display:flex;
justify-content:center;
align-items:center;
margin-top:50px;
}

.about-card{
background:white;
padding:40px;
width:500px;
border-radius:12px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
transition:0.3s;
}

.about-card:hover{
transform:translateY(-10px);
}

.about-card h2{
color:#ff3d00;
margin-bottom:15px;
}

.about-card p{
color:#555;
line-height:1.6;
}

.btn{
margin-top:20px;
padding:12px 25px;
border:none;
background:#ff3d00;
color:white;
font-size:16px;
border-radius:25px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:#e63600;
}

</style>

</head>

<body>

<nav>
<a href="/">Home</a>
<a href="/about">About</a>
<a href="/contact">Contact</a>
<a href="/blog">Blog</a>
</nav>

<h1 class="title">Welcome to About Page</h1>

<div class="about-container">

<div class="about-card">

<h2>About Our Website</h2>

<p>
This website is created to demonstrate a clean and modern web design using HTML and CSS.
We focus on creating user-friendly interfaces and responsive layouts that look professional.
</p>

<button class="btn">Learn More</button>

</div>

</div>

</body>
</html>
